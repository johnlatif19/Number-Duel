<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Duel - لعبة تخمين الأرقام</title>
        <link rel="icon" type="image/png" href="https://i.postimg.cc/tJB1SG8c/Number-Duel.png">    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes rotateSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a3e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND PARTICLES ===== */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1), transparent);
            animation: float 20s infinite alternate ease-in-out;
        }

        .particle:nth-child(1) { width: 300px; height: 300px; top: -100px; left: -100px; animation-duration: 25s; }
        .particle:nth-child(2) { width: 400px; height: 400px; bottom: -150px; right: -150px; animation-duration: 30s; animation-delay: 2s; }
        .particle:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-duration: 20s; animation-delay: 4s; }
        .particle:nth-child(4) { width: 150px; height: 150px; top: 20%; right: 10%; animation-duration: 22s; animation-delay: 1s; }
        .particle:nth-child(5) { width: 250px; height: 250px; bottom: 20%; left: 10%; animation-duration: 28s; animation-delay: 3s; }

        /* ===== ORBITAL RINGS ===== */
        .orbital-ring {
            position: fixed;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            animation: rotateSlow 60s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orbital-ring:nth-child(6) { width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-duration: 80s; }
        .orbital-ring:nth-child(7) { width: 800px; height: 800px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-duration: 100s; animation-direction: reverse; }

        /* ===== MAIN CONTAINER ===== */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 50px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        /* ===== LOGO ===== */
        .logo-container {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
        }

        .logo-container img {
            max-width: 280px;
            width: 100%;
            height: auto;
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 10px 40px rgba(102, 126, 234, 0.3));
            transition: filter 0.3s ease;
        }

        .logo-container img:hover {
            filter: drop-shadow(0 15px 60px rgba(102, 126, 234, 0.5));
        }

        /* ===== SUBTITLE ===== */
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: -5px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .subtitle span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn-group .btn-wrapper {
            flex: 1;
            min-width: 140px;
        }

        .btn {
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            position: relative;
            overflow: hidden;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Primary Button - Create Room */
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 48px rgba(102, 126, 234, 0.5);
        }

        .btn-primary .icon {
            font-size: 20px;
        }

        /* Secondary Button - Join Room */
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            box-shadow: 0 8px 32px rgba(245, 87, 108, 0.35);
        }

        .btn-secondary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 48px rgba(245, 87, 108, 0.5);
        }

        .btn-secondary .icon {
            font-size: 20px;
        }

        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 18px 0 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        .divider span {
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* ===== SOCIAL LINKS ===== */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .social-link.whatsapp:hover {
            background: rgba(37, 211, 102, 0.15);
            border-color: rgba(37, 211, 102, 0.2);
            color: #25d366;
        }

        .social-link .icon {
            font-size: 18px;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.12);
            font-size: 11px;
            letter-spacing: 0.5px;
            line-height: 1.8;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: rgba(255, 255, 255, 0.4);
        }

        .footer .heart {
            color: #f5576c;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        /* ===== STATUS DOTS ===== */
        .status-text {
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            letter-spacing: 1px;
            text-align: center;
            margin: 12px 0 8px;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .glass-card {
                padding: 35px 25px 30px;
                border-radius: 28px;
            }

            .logo-container img {
                max-width: 200px;
            }

            .btn-group {
                gap: 10px;
            }

            .btn-group .btn-wrapper {
                min-width: 120px;
            }

            .btn {
                font-size: 14px;
                padding: 14px 16px;
                border-radius: 14px;
                letter-spacing: 1px;
            }

            .btn .icon {
                font-size: 18px;
            }

            .subtitle {
                font-size: 12px;
                letter-spacing: 3px;
                margin-bottom: 25px;
            }

            .social-link {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        @media (max-width: 400px) {
            .glass-card {
                padding: 25px 16px 22px;
                border-radius: 20px;
            }

            .logo-container img {
                max-width: 150px;
            }

            .btn-group {
                flex-direction: column;
                gap: 10px;
            }

            .btn-group .btn-wrapper {
                min-width: unset;
            }

            .btn {
                font-size: 13px;
                padding: 13px 14px;
                gap: 8px;
            }

            .subtitle {
                font-size: 10px;
                letter-spacing: 2px;
                margin-bottom: 20px;
            }

            .social-links {
                flex-direction: column;
                align-items: center;
            }
        }

        /* ===== DARK MODE SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- ===== ANIMATED BACKGROUND ===== -->
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="orbital-ring"></div>
    <div class="orbital-ring"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">
        <div class="glass-card">
            <!-- Logo -->
            <div class="logo-container">
                <img 
                    src="https://i.postimg.cc/tJB1SG8c/Number-Duel.png" 
                    alt="Number Duel Logo"
                    loading="lazy"
                />
            </div>

            <!-- Subtitle -->
            <p class="subtitle">
                <span>⚔️</span> تحدي الأرقام <span>⚔️</span>
            </p>

            <!-- Buttons - Side by Side -->
            <div class="btn-group">
                <div class="btn-wrapper">
                    <a href="/create-room" style="text-decoration: none; display: block;">
                        <button class="btn btn-primary">
                            <span class="icon">🎯</span>
                            إنشاء غرفة
                        </button>
                    </a>
                </div>

                <div class="btn-wrapper">
                    <a href="/enter-room" style="text-decoration: none; display: block;">
                        <button class="btn btn-secondary">
                            <span class="icon">🚪</span>
                            دخول غرفة
                        </button>
                    </a>
                </div>
            </div>

            <!-- Divider -->
            <div class="divider">
                <span>تواصل معنا</span>
            </div>

            <!-- Social Links -->
            <div class="social-links">
                <a href="https://wa.me/201274445091" 
                   target="_blank" 
                   class="social-link whatsapp">
                    <span class="icon">💬</span>
                    واتساب
                </a>
            </div>

            <!-- Status -->
            <div class="status-text">
                <span class="status-dot"></span>
                جاهز للعب
            </div>

            <!-- Footer -->
            <div class="footer">
                <p>
                    &copy; 2026 <a href="#">Number Duel</a> &bull; 
                    تم إنشاء هذا الموقع بواسطة <a href="#">John Latif</a>
                    <br>
                    <span class="heart">❤️</span> صنع بحب للاعبين <span class="heart">❤️</span>
                </p>
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script>
        // ===== CONSOLE WELCOME =====
        console.log('%c🎯 Number Duel', 'font-size: 24px; font-weight: bold; color: #667eea;');
        console.log('%c⚔️ استعد للتحدي!', 'font-size: 16px; color: #764ba2;');
        console.log('%c📱 مصمم للعب مع الأصدقاء', 'font-size: 14px; color: #888;');

        // ===== TRACK BUTTON CLICKS =====
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.btn');
            
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    // Add ripple effect
                    const ripple = document.createElement('span');
                    ripple.style.position = 'absolute';
                    ripple.style.borderRadius = '50%';
                    ripple.style.background = 'rgba(255,255,255,0.3)';
                    ripple.style.transform = 'scale(0)';
                    ripple.style.animation = 'ripple 0.6s ease-out';
                    ripple.style.width = '100px';
                    ripple.style.height = '100px';
                    ripple.style.left = '50%';
                    ripple.style.top = '50%';
                    ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                    ripple.style.pointerEvents = 'none';
                    
                    this.style.position = 'relative';
                    this.style.overflow = 'hidden';
                    this.appendChild(ripple);
                    
                    setTimeout(() => {
                        ripple.remove();
                    }, 600);
                });
            });
        });

        // ===== ADD RIPPLE ANIMATION =====
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: translate(-50%, -50%) scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // ===== PARALLAX EFFECT ON MOUSE MOVE =====
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            const particles = document.querySelectorAll('.particle');
            particles.forEach((particle, index) => {
                const speed = 0.5 + (index * 0.1);
                particle.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });

        // ===== CHECK SERVER STATUS =====
        async function checkServerStatus() {
            try {
                const response = await fetch('/api/health');
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Server is online:', data);
                }
            } catch (error) {
                console.warn('⚠️ Server status check failed:', error.message);
            }
        }

        // Check server status on load
        checkServerStatus();

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            // Press 'C' for Create Room
            if (e.key === 'c' || e.key === 'C') {
                const createBtn = document.querySelector('.btn-primary');
                if (createBtn) createBtn.click();
            }
            // Press 'J' for Join Room
            if (e.key === 'j' || e.key === 'J') {
                const joinBtn = document.querySelector('.btn-secondary');
                if (joinBtn) joinBtn.click();
            }
        });

        console.log('%c⌨️ Keyboard shortcuts: C=Create, J=Join', 'font-size: 12px; color: #666;');
    </script>
</body>
</html>
